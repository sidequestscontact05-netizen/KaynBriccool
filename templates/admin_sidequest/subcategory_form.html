{% extends 'base_admin.html' %}

{% block title %}Admin — Créer Sous-catégorie{% endblock %}

{% block dashboard_content %}
<div class="page-header">
    <a href="{% url 'admin_KaynBricool:subcategories' %}" class="btn-back" title="Retour">&#8592;</a>
    <h1>Créer une sous-catégorie</h1>
</div>

<form method="post" class="form form-wide">
    {% csrf_token %}
    <div class="form-group">
        <label for="category">Catégorie parente</label>
        <select id="category" name="category" class="form-input">
            {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" class="form-input" required>
    </div>
    <div class="form-group">
        <label for="slug">Slug (optionnel)</label>
        <input type="text" id="slug" name="slug" class="form-input">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-admin">Créer</button>
        <a href="{% url 'admin_KaynBricool:subcategories' %}" class="btn btn-admin-outline">Annuler</a>
    </div>
</form>
{% endblock %}
